<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Me</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="stars"></div>
  <nav class="passport-nav">
  <div class="passport-banner">
    <h1>☆ ★ ☆ ★ ☆ P̲E̲R̲M̲A̲N̲E̲N̲T̲ L̲I̲C̲E̲N̲S̲E̲ O̲F̲ P̲O̲R̲T̲O̲F̲O̲L̲I̲O̲ ☆ ★ ☆ ★ ☆</h1>
  </div>

  <!-- Navbar -->
    <ul>
      <li><a href="index.html">◦Home◦</a></li>
    </ul>
</nav>

        <div class="header-foil"></div>
            <img src="../logo/call-me-if-you-get-lost.png" class="tag-overlay" />
      </div>
  <!-- Contact Section -->
  <section id="contact-section">
    <h2>★ Get in Touch ★</h2>
    <form id="contact-form" action="https://formspree.io/f/mvzpzjzk" method="POST">
      
      <div class="form-group">
        <label for="name">Your Name:</label>
        <input type="text" id="name" name="name" autocomplete="name" required>
      </div>

      <div class="form-group">
        <label for="email">Your Email:</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label for="subject">Subject Email:</label>
        <input type="text" id="subject" name="subject" required>
      </div>

      <div class="form-group">
        <label for="message">Message Email:</label>
        <textarea id="message" name="message" rows="6" required></textarea>
      </div>

      <div class="form-buttons">
        <button type="submit">Send</button>
      </div>
    </form>

    <!-- Tempat pesan sukses/gagal -->
    <p id="form-status" style="text-align:center; margin-top:12px; font-family:'Libre Franklin',sans-serif; font-size:13px;"></p>
  </section>

  <!-- Footer -->
  <footer>
    <div class="stamp-overlay-approved" id="stamp">BON, VOYAGE !</div>
    <p class="footer-signature">&copy; 2025 Ridho Nur Fauzi. Semua Hak Dilindungi.</p>
    <div class="footer-signature">
    <img src="../profile/signature.png" alt="Tanda Tangan Ridho" class="signature-img" />
  </div>
  </footer>

    <script src="scripts.js"></script>
</body>
</html>
